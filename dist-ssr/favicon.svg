<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ca1f5" />
      <stop offset="100%" stop-color="#1483dc" />
    </linearGradient>
  </defs>
  <!-- Background with smooth rounded corners -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- White calligraphic path for 'pv' letters with a professional thickness -->
  <g fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
    <!-- The elegant letter 'p' path -->
    <path d="M 130 180 C 130 120, 195 120, 195 180 C 195 240, 120 400, 100 440" />
    <path d="M 115 360 C 145 310, 215 300, 215 370 C 215 420, 175 420, 150 400" />
    
    <!-- Smooth connection and letter 'v' -->
    <path d="M 215 370 C 245 320, 275 220, 315 220 C 345 220, 355 250, 345 300 C 335 350, 315 420, 355 420 C 385 420, 425 350, 445 260" />
    
    <!-- The elegant script loop at the end of 'v' -->
    <path d="M 405 280 C 425 242, 455 242, 470 270" stroke-width="36" />
  </g>
</svg>
